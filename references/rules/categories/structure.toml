group = "structure"
description = "structure AI trace rules"

[[categories]]
id = "sentence_patterns"
name = "规整句式特征"
severity = "high"
weight = 0.8
description = "“主要贡献包括(1)(2)(3)”“问题-方法-实验-证明”等过度规整、过于完美的逻辑闭环。AI 生成的研究描述常呈现“问题→方法→实验→证明”的完美直线，缺少真实研究中的探索、试错和回头修正，读起来像模板填空而非真实思考轨迹。"
rewrite_mode = "manual_or_llm"
signals = ["主要贡献包括：(1)…(2)…(3)…", "问题…方法…实验…证明", "本文直接提出了"]
regex_patterns = ["主要贡献包括[^：]*：\\s*\\(?1\\)?[^，。]*\\(?2\\)?[^，。]*\\(?3\\)?", "主要工作如下[^：]*：\\s*\\(?1\\)?[^，。]*\\(?2\\)?[^，。]*\\(?3\\)?", "问题[^，。]*存在[^，。]*方法[^，。]*解决[^，。]*因此[^，。]*提出[^，。]*实验[^，。]*证明", "本文直接提出了", "本研究直接采用", "为了[^，。]*，本文[^，。]*。具体而言[^，。]*"]
false_positive_notes = ["方法章节可有步骤说明，但应解释选择依据和实际约束。", "结论或创新点部分归纳“本文提出了/建立了……”属于规范写法，不等于模板化。", "若(1)(2)(3)每项后面都附具体数据、机制或案例，而非空壳口号，可降低风险。"]
rewrite_principles = ["打破规整结构，使用长短句交替。", "补充推理过程、限制条件和案例细节。"]

[[categories.examples]]
before = "本文主要贡献包括：(1)提出了新模型；(2)验证了有效性；(3)提升了性能。"
after = "本文先根据XYZ公司的访谈数据识别出绩效考核的三个主要痛点，在此基础上设计改进方案，并结合实施后的流失率变化验证其效果。"

[[categories.examples]]
before = "为了提升效率，本文提出了新流程。具体而言包括三个步骤。"
after = "现有审批流程平均耗时5天，主要卡在跨部门会签环节。本文尝试将会签改为并行审批，并预估可将时长压缩至2天。"

[[categories]]
id = "three_part_rule"
name = "三段式法则"
severity = "medium"
weight = 0.55
description = "AI 喜欢把任何内容强行拆成三项：背景、现状、展望；创新、灵感、洞察。"
rewrite_mode = "manual_or_llm"
signals = ["三个方面", "三点原因", "三项措施"]
regex_patterns = ["(?:三个|三方面|三点|三项)[^，。]*(?:原因|措施|建议|路径|启示)", "包括[^。]*(?:一是|二是|三是)", "从[^，。]*、[^，。]*和[^，。]*三个(?:方面|维度)"]
false_positive_notes = ["若该表述来自访谈原话、政策原文或文献直接引用，应保留原文并标注来源。", "若同段已经给出具体数据、企业场景或因果机制，可降低风险。", "真实研究确有三项变量或三类措施时可保留，但需解释分类依据。"]
rewrite_principles = ["不要为凑三项硬拆内容。", "按论证需要决定数量。"]

[[categories.examples]]
before = "本文从创新、效率和价值三个维度展开。"
after = "本文围绕库存周转和客户响应两个问题展开。"

[[categories.examples]]
before = "主要原因包括一是制度、二是人员、三是文化。"
after = "主要原因是考核周期过长和奖金权重过低。"

[[categories]]
id = "challenge_outlook_formula"
name = "挑战与展望模板"
severity = "medium"
weight = 0.6
description = "以“尽管面临挑战，但前景广阔/未来可期”结尾，缺少风险边界和实施条件。"
rewrite_mode = "manual_or_llm"
signals = ["尽管面临挑战但前景广阔", "未来可期"]
regex_patterns = ["尽管[^。]*挑战[^。]*前景(?:广阔|可期)", "未来(?:发展)?(?:前景|空间)[^。]*(?:广阔|可期)", "虽然[^。]*困难[^。]*但[^。]*(?:充满希望|前景良好)"]
false_positive_notes = ["若该表述来自访谈原话、政策原文或文献直接引用，应保留原文并标注来源。", "若同段已经给出具体数据、企业场景或因果机制，可降低风险。", "展望部分可以讨论未来，但应写具体风险、假设和实施条件。"]
rewrite_principles = ["写清风险、约束和下一步验证。", "避免空泛乐观结尾。"]

[[categories.examples]]
before = "尽管面临挑战，但企业未来发展前景广阔。"
after = "若不能在2024年内降低应收账款周转天数，扩张计划将面临现金流压力。"

[[categories.examples]]
before = "公司未来发展空间巨大。"
after = "公司能否扩张取决于新增门店的单店盈利能力。"

[[categories]]
id = "abstract_template"
name = "摘要模板化"
severity = "medium"
weight = 0.6
description = "摘要中机械套用“本文针对……问题，采用……方法，提出……对策，结果表明……”结构。"
rewrite_mode = "manual_or_llm"
signals = ["本文针对…问题", "采用…方法", "结果表明"]
regex_patterns = ["本文针对[^，。]*问题[^，。]*(?:采用|运用)[^，。]*(?:方法|模型)", "提出[^，。]*(?:对策|建议|方案)[^。]*结果表明", "研究结果表明[^，。]*(?:具有|能够|可以)"]
false_positive_notes = ["若该表述来自访谈原话、政策原文或文献直接引用，应保留原文并标注来源。", "若同段已经给出具体数据、企业场景或因果机制，可降低风险。", "摘要需要概括研究对象、方法和结论；风险在于无细节、全是套式。"]
rewrite_principles = ["摘要写具体对象、数据来源、核心发现。", "少用空泛“结果表明”，直接写结果。"]

[[categories.examples]]
before = "本文针对A公司存在的问题，采用问卷法提出对策，结果表明方案有效。"
after = "本文基于A公司120份客户问卷，识别售后响应慢和会员权益兑现不足两个问题，并提出流程调整方案。"

[[categories.examples]]
before = "研究结果表明该方案具有可行性。"
after = "试点后客户投诉率从8.6%降至5.2%，说明流程调整具有初步效果。"

[[categories]]
id = "conclusion_echo_abstract"
name = "结论复述摘要"
severity = "low"
weight = 0.45
description = "结论部分简单重复摘要或研究内容，没有列出具体发现、局限和后续方向。"
rewrite_mode = "manual_or_llm"
signals = ["本文研究了…并提出…", "重复摘要"]
regex_patterns = ["本文(?:研究|分析)了[^。]*并(?:提出|构建)[^。]*", "综上(?:所述)?[^。]*(?:本文|本研究)[^。]*(?:研究|分析|提出)"]
false_positive_notes = ["若该表述来自访谈原话、政策原文或文献直接引用，应保留原文并标注来源。", "若同段已经给出具体数据、企业场景或因果机制，可降低风险。", "结论可以回扣研究问题，但应增加发现、局限和实施建议。"]
rewrite_principles = ["分条写主要发现。", "补充局限性和后续研究方向。"]

[[categories.examples]]
before = "综上所述，本文研究了绩效考核问题并提出优化建议。"
after = "本文发现考核周期过长和奖金权重过低是研发人员不满的主要原因；方案仍需在下一季度试点验证。"

[[categories.examples]]
before = "本研究具有一定参考价值。"
after = "本研究对研发人员占比较高的中小制造企业有参考价值，但样本仅来自XYZ公司。"

[[categories]]
id = "author_listing_lit_review"
name = "文献综述按作者罗列"
severity = "medium"
weight = 0.65
description = "文献综述连续使用“A认为、B指出、C提出”，缺少主题归纳和批判比较。"
rewrite_mode = "manual_or_llm"
signals = ["张三认为", "李四指出", "王五提出"]
regex_patterns = ["\\w{1,4}\\(\\d{4}\\)[^。]*(?:认为|指出|提出)[^。]*。\\w{1,4}\\(\\d{4}\\)[^。]*(?:认为|指出|提出)", "[\\u4e00-\\u9fff]{2,4}认为[^。]*。[\\u4e00-\\u9fff]{2,4}指出[^。]*。[\\u4e00-\\u9fff]{2,4}提出"]
false_positive_notes = ["若该表述来自访谈原话、政策原文或文献直接引用，应保留原文并标注来源。", "若同段已经给出具体数据、企业场景或因果机制，可降低风险。", "简短介绍代表性文献可按作者，但综述主体应按主题组织。"]
rewrite_principles = ["按主题/方法/结论差异归纳。", "指出已有研究不足，而非堆作者。"]

[[categories.examples]]
before = "张三认为绩效重要。李四指出激励有效。王五提出考核模型。"
after = "已有研究主要从激励机制和考核指标两个角度讨论绩效管理，但较少关注研发人员的项目制特征。"

[[categories.examples]]
before = "Smith(2019)认为A，Jones(2020)指出B。"
after = "国外研究主要关注客户忠诚度的满意度路径和转换成本路径。"

[[categories]]
id = "method_name_pileup"
name = "方法名称堆砌"
severity = "medium"
weight = 0.55
description = "研究方法章节只罗列问卷法、访谈法、文献法、案例法，不说明为何选择和如何实施。"
rewrite_mode = "manual_or_llm"
signals = ["文献法、问卷法、访谈法", "采用多种方法"]
regex_patterns = ["(?:文献研究法|问卷调查法|访谈法|案例分析法|实证分析法)[、，](?:文献研究法|问卷调查法|访谈法|案例分析法|实证分析法)", "采用(?:了)?多种研究方法", "综合运用[^。]*(?:方法|模型)"]
false_positive_notes = ["若该表述来自访谈原话、政策原文或文献直接引用，应保留原文并标注来源。", "若同段已经给出具体数据、企业场景或因果机制，可降低风险。", "方法名称可以列出，但必须说明数据来源、样本、访谈对象和适用原因。"]
rewrite_principles = ["说明每种方法解决哪个研究问题。", "写清样本量、访谈对象、实施步骤。"]

[[categories.examples]]
before = "本文采用文献法、问卷法、访谈法和案例分析法。"
after = "本文用文献法确定客户忠诚度变量，用问卷法收集120名客户数据，并访谈6名销售经理核对问题成因。"

[[categories.examples]]
before = "综合运用多种研究方法。"
after = "问卷用于量化满意度，访谈用于解释低分原因。"

[[categories]]
id = "empty_solution_verbs"
name = "空泛对策动词"
severity = "high"
weight = 0.75
description = "对策建议只写加强、完善、优化、提升、推进、建立，缺少行动主体、步骤和资源约束。"
rewrite_mode = "manual_or_llm"
signals = ["加强管理", "完善制度", "提升能力"]
regex_patterns = ["(?:加强|完善|提升|推进|建立|健全)[^，。]{0,8}(?:管理|制度|体系|机制|能力|建设)", "应当(?:加强|完善|优化|提升|推进)", "需要(?:加强|完善|优化|提升|推进)"]
false_positive_notes = ["若该表述来自访谈原话、政策原文或文献直接引用，应保留原文并标注来源。", "若同段已经给出具体数据、企业场景或因果机制，可降低风险。", "标题中使用“优化研究”正常；风险在于正文建议只有动词没有措施。"]
rewrite_principles = ["写清行动主体、时间、资源、步骤和预期指标。", "把口号动词拆成可执行任务。"]
phrase_replacements = [
    "加强…管理 → 制定(主体)(时间)的管理SOP,覆盖(范围)",
    "完善…制度 → 出台(主体)(时间)的(具体制度名),条款包括…",
    "提升…能力 → (主体)在(时间)内完成(培训/考核)X次,达标率Y%",
    "推进…建设 → 分(阶段)推进(项目名),里程碑:…",
    "建立…机制 → 建立由(主体)牵头的(月/季)度(机制名),考核指标…",
    "健全…体系 → 健全由(部门)负责的(体系名),覆盖(对象)X类",
]

[[categories.examples]]
before = "企业应加强员工管理，完善激励机制。"
after = "人力资源部每季度组织一次绩效面谈，并将项目奖金权重从10%提高到20%。"

[[categories.examples]]
before = "需要提升客户服务能力。"
after = "客服部将响应时限从48小时缩短至24小时，并设置超时提醒。"

[[categories]]
id = "problem_solution_mismatch"
name = "问题对策不对应"
severity = "high"
weight = 0.8
description = "前文问题与后文对策没有一一对应，建议像通用模板而非针对案例。"
rewrite_mode = "manual_or_llm"
signals = ["问题是成本，对策讲文化", "建议与问题脱节"]
regex_patterns = ["(?:问题|不足)[^。]*(?:成本|库存|流失)[^。]*。[^。]*(?:企业文化|品牌建设|社会责任)", "(?:对策|建议)[^。]*(?:加强学习|提高认识|统一思想)"]
false_positive_notes = ["若该表述来自访谈原话、政策原文或文献直接引用，应保留原文并标注来源。", "若同段已经给出具体数据、企业场景或因果机制，可降低风险。", "管理问题往往相互关联，需人工判断对策是否真能回应问题。"]
rewrite_principles = ["建立问题—原因—对策对应表。", "每条建议都写明对应前文哪个问题。"]

[[categories.examples]]
before = "库存积压严重。建议加强企业文化建设。"
after = "库存积压严重。建议将销售预测数据接入采购计划，并设置库存预警阈值。"

[[categories.examples]]
before = "研发人员流失率高。建议提高品牌影响力。"
after = "研发人员流失率高。建议调整项目奖金权重并增加季度绩效反馈。"

[[categories]]
id = "missing_constraints_in_solutions"
name = "对策忽视约束"
severity = "medium"
weight = 0.65
description = "方案看似完整，但不讨论预算、人员、时间、组织阻力、数据条件等实施约束。"
rewrite_mode = "manual_or_llm"
signals = ["全面推进", "立即落地", "全员实施"]
regex_patterns = ["全面(?:推进|实施|开展)", "立即(?:落地|实施|推广)", "全员(?:参与|实施|覆盖)", "确保[^，。]*(?:顺利|全面)实施"]
false_positive_notes = ["若该表述来自访谈原话、政策原文或文献直接引用，应保留原文并标注来源。", "若同段已经给出具体数据、企业场景或因果机制，可降低风险。", "实施保障章节可使用“推进/实施”，但应配套资源安排。"]
rewrite_principles = ["补充预算、人力、时间表和风险预案。", "分阶段实施，而非一次性全面推广。"]

[[categories.examples]]
before = "公司应全面推进数字化改革。"
after = "公司先在生产部试点MES系统，预算为80万元，试点期为3个月。"

[[categories.examples]]
before = "该方案可立即落地。"
after = "该方案需先完成薪酬权限调整，预计需1个月审批周期。"

[[categories]]
id = "empty_transition_paragraph"
name = "空过渡段"
severity = "low"
weight = 0.35
description = "整段只说承上启下，不提供新信息。"
rewrite_mode = "manual_or_llm"
signals = ["承上启下", "下面将", "接下来"]
regex_patterns = ["基于上述分析[^。]*下文[^。]*", "接下来(?:将)?[^。]*(?:展开|分析|讨论)", "本章(?:首先|其次|最后)[^。]*"]
false_positive_notes = ["若该表述来自引用、访谈原话或政策文本，应保留并标注来源。", "若同段已有数据、方法说明或案例证据，可降低风险。", "章节导语可以简短出现，但不应占据完整段落。"]
rewrite_principles = ["补充具体对象、方法、数据和因果关系。", "删除不提供信息的模板化表达。"]

[[categories.examples]]
before = "基于上述分析，接下来将进一步展开。"
after = "删除该过渡句，直接进入问题分析。"

[[categories.examples]]
before = "本章将从三个方面展开。"
after = "本章分析客户流失率、投诉响应和会员权益三个问题。"
