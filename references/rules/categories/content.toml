group = "content"
description = "content AI trace rules"

[[categories]]
id = "exaggerated_emphasis"
name = "过度强调"
severity = "medium"
weight = 0.8
description = "用“关键/重要/核心/至关重要/不可或缺/灵魂人物”等价值判断词把普通事实拔高，制造分量感却不给证据。AI 尤其喜欢在句首或句尾堆叠这类形容词来“显得深刻”，但 MBA 论文要求用数据、机制和具体表现说话，而非主观定性。"
rewrite_mode = "manual_or_llm"
signals = ["关键的是", "核心竞争力", "至关重要", "不可或缺", "灵魂人物", "重中之重"]
regex_patterns = ["关键(?:的是|在于|作用|意义)", "重要(?:的是|意义|价值|作用)", "核心(?:竞争力|要素|能力|优势)", "灵魂人物", "绝对(?:是|的)", "至关重要"]
false_positive_notes = ["如果“核心/关键”是理论术语或指标名称的固定组成部分（如“核心竞争力理论”“关键绩效指标KPI”“关键路径法CPM”），属于专有名词，不应判为过度强调。", "若“关键”后紧跟具体量化依据（如“关键工序（占工时60%）”），已有证据支撑，可降低风险。", "引用他人观点或政策原文中出现的“至关重要”等词，属于转述，不计入作者本人的过度强调。", "访谈引语、问卷选项原文里的强调词应保留，不作改写。"]
rewrite_principles = ["删除价值判断词汇，直接陈述事实。", "用数据、机制或具体表现替代空泛强调，例如把“至关重要”改为“影响了X%的产出”。", "确需体现重要性时，用“对……影响最大”并给出排序依据。"]

[[categories.examples]]
before = "人才是企业发展的核心竞争力，至关重要。"
after = "2020—2023年，该公司技术人才占比从15%升至28%，同期人均产值提高22%。"

[[categories.examples]]
before = "绩效管理是企业管理中不可或缺的关键环节。"
after = "绩效考核直接决定该公司60%的浮动薪酬分配，是员工最关注的管理制度之一。"

[[categories.examples]]
before = "数字化转型对制造企业绝对是重中之重。"
after = "该厂将数字化改造列为2023年第一优先级项目，预算占当年技改投入的45%。"

[[categories]]
id = "vague_attribution"
name = "模糊归因"
severity = "high"
weight = 0.9
description = "使用“有研究表明/专家认为/学者普遍认为/相关数据显示”等无明确来源的权威归因，把观点推给含糊的权威而不给出可核实的作者、年份或数据来源。这是 AI 文本中风险最高的特征之一，因为它往往伴随虚构引用，直接影响论文的学术诚信与可信度。"
rewrite_mode = "manual_or_llm"
signals = ["有研究表明", "专家认为", "普遍认为", "相关数据显示", "业内人士表示"]
regex_patterns = ["(?:有|据|相关)研究(?:表明|指出|显示|发现)", "专家(?:指出|认为|表示|强调)", "学者(?:普遍认为|研究发现)", "普遍(?:认为|看来|认同)"]
false_positive_notes = ["若同句或相邻位置已有作者、年份、文献编号或明确来源（如“Smith(2019)”“据公司2023年年报”），属于规范引用，不应判为模糊归因。", "文献综述章节概括多篇文献共识时，若后面附有多个引注，可降低严重度但仍建议标明代表性文献。", "“数据显示”若紧跟具体来源（如“国家统计局数据显示”），属于明确归因，不判风险。", "转述政策文件或企业公开声明时，保留原文表述即可。"]
rewrite_principles = ["明确引用具体文献或数据来源（作者、年份、页码或数据库）。", "无法核实来源时，删除权威归因并直接陈述可验证事实，不得编造文献。"]
phrase_replacements = [
    "有研究表明 → (具体作者 年份)的研究表明",
    "专家认为 → (具名专家，年份)指出",
    "学者普遍认为 → (张三 等, 年份)认为",
    "相关数据显示 → 据(数据来源, 时间)",
    "业内人士表示 → (具名受访者, 单位)表示",
    "普遍认同 → (具名文献, 年份)指出",
]

[[categories.examples]]
before = "有研究表明，企业文化对组织绩效具有重要影响。"
after = "Schein(2010)的研究表明，强势企业文化与组织绩效存在正相关关系（r=0.42, p<0.05）。"

[[categories.examples]]
before = "专家普遍认为，供应链数字化是制造业升级的方向。"
after = "张敏(2021)与李刚(2022)均指出，供应链数字化是制造业升级的方向；本文将结合XYZ公司数据验证这一观点。"

[[categories]]
id = "surface_analysis"
name = "表面分析"
severity = "medium"
weight = 0.7
description = "用“凸显了……/反映了……/体现了……/揭示了……”等“动词+了”句式制造分析感，对应英文 -ing 结尾的肤浅分析，实际只是重复上文、没有新信息，也不解释因果机制。AI 常在句尾附加这类短语来“显得有深度”，但缺少数据或案例支撑。"
rewrite_mode = "manual_or_llm"
signals = ["凸显了重要性", "反映出问题", "体现了价值", "揭示了规律"]
regex_patterns = ["凸显(?:了|出)[^，。]*(?:重要性|价值|意义)", "反映(?:了|出)[^，。]*(?:问题|趋势|特征)", "体现(?:了|出)[^，。]*(?:价值|意义|作用)"]
false_positive_notes = ["如果后文立即给出数据、因果机制或案例证据（如“体现了管理效率提升，成本下降8%”），可降低风险。", "统计/实验语境中“反映”作为中性描述动词（如“图3反映了销售额变化”）且携带具体对象时，风险较低。", "引用文献结论时出现的“揭示了……规律”，若注明来源，属于转述而非作者自评。"]
rewrite_principles = ["提供具体机制解释或数据支撑。", "把抽象评价改为问题表现、原因和结果。"]

[[categories.examples]]
before = "这一现象凸显了管理的重要性。"
after = "实施新绩效考核制度后，该部门员工离职率从18%降至12%。"

[[categories.examples]]
before = "该数据反映了企业运营存在的问题。"
after = "库存周转天数从45天升至68天，说明采购与销售预测脱节，导致备货积压。"

[[categories]]
id = "macro_narrative"
name = "宏观叙事"
severity = "medium"
weight = 0.7
description = "把具体管理问题上升为“时代/历史/趋势/战略高度/推动……变革”等宏大叙事。AI 倾向把任意主题都套上“在……大背景下”“顺应……浪潮”，制造台阶感，但 MBA 论文需要“小题大做”，聚焦具体企业、具体问题和可验证数据。"
rewrite_mode = "manual_or_llm"
signals = ["时代背景", "战略高度", "推动变革", "数字化浪潮", "新时代"]
regex_patterns = ["推动[^，。]+变革", "时代(?:的|背景|意义)", "历史(?:的|进程|意义)", "趋势(?:表明|显示|说明)", "战略(?:高度|意义|价值)"]
false_positive_notes = ["研究背景章节可允许必要背景，但应尽快落到具体企业和问题。", "“战略”在战略管理类论文中是核心术语（如“战略定位”“竞争战略”），不应因出现“战略”二字就判宏大叙事。", "引用行业报告、政策文件中的趋势描述，若注明来源，属于证据而非叙事。", "行业背景与宏观环境分析（如PEST）中的必要宏观描述不算空泛。"]
rewrite_principles = ["聚焦具体研究对象和实证数据。", "用企业场景、时间、指标替代宏大判断。"]

[[categories.examples]]
before = "在数字化浪潮的时代背景下，企业数字化转型推动产业变革。"
after = "XYZ公司2022年启动ERP系统升级，目标是解决生产排程混乱导致的交付延误问题。"

[[categories.examples]]
before = "顺应时代发展潮流，本研究具有重大意义。"
after = "本研究针对XYZ公司研发人员流失率25%的问题，提出可落地的绩效考核改进方案。"

[[categories]]
id = "promotional_language"
name = "宣传性语言"
severity = "medium"
weight = 0.6
description = "使用“卓越/显著/突出/优秀/巨大”等广告式、情绪化评价词拔高效果，而不给出可比较的基准或数据。AI 在中立语气上表现弱，尤其描述成绩时倾向堆砌正面形容词，使文本读起来像定传而非学术论述。"
rewrite_mode = "manual_or_llm"
signals = ["显著提升", "卓越表现", "巨大成功", "优异成果"]
regex_patterns = ["卓越(?:的|性能|表现)", "显著(?:的|成效|提升|改善)", "突出(?:的|贡献|成绩)", "优秀(?:的|表现|成果)", "巨大(?:的|成功|成就)"]
false_positive_notes = ["如果“显著”后接统计检验或对比基准（如“显著性差异 p<0.05”“显著高于行业均值”），属于统计术语，不判为宣传。", "“突出”作为中性动词（如“突出重围”“问题尤为突出”）时不属宣传性评价。", "引用企业官方措辞、获奖证书原文时，保留原文即可。"]
rewrite_principles = ["使用客观描述性词汇。", "用指标、基准和数据变化替代宣传性评价。"]

[[categories.examples]]
before = "新方案取得了显著成效，客户满意度大幅提升。"
after = "客户满意度评分从2021年的3.8分提升至2023年的4.5分（5分制）。"

[[categories.examples]]
before = "该企业取得了巨大成功，具有优秀的市场表现。"
after = "该企业市场份额从12%升至18%，连续三年位居区域第一。"

[[categories]]
id = "empty_theoretical_practical_value"
name = "空泛研究意义"
severity = "high"
weight = 0.85
description = "用“具有重要理论意义和实践价值”等套话声明研究价值，但没有说明解决哪个企业问题、补充哪个研究空白。"
rewrite_mode = "manual_or_llm"
signals = ["重要理论意义和实践价值", "丰富相关研究", "提供参考"]
regex_patterns = ["具有重要(?:的)?理论意义和(?:现实|实践)意义", "具有重要(?:的)?理论价值和(?:现实|实践)价值", "丰富(?:了)?[^，。]*研究", "为[^，。]*提供(?:了)?(?:重要)?参考"]
false_positive_notes = ["若该表述来自访谈原话、政策原文或文献直接引用，应保留原文并标注来源。", "若同段已经给出具体数据、企业场景或因果机制，可降低风险。", "开题报告或论文摘要中可有价值说明，但必须紧跟具体对象、问题和贡献。"]
rewrite_principles = ["用具体企业问题说明研究价值。", "把“意义”拆成理论补充点和实践应用场景。"]

[[categories.examples]]
before = "本研究具有重要的理论意义和实践价值。"
after = "本研究针对XYZ公司研发人员流失率较高的问题，补充绩效考核在中小制造企业中的应用案例。"

[[categories.examples]]
before = "本文丰富了相关理论研究。"
after = "本文将期望理论用于解释XYZ公司研发人员对绩效考核周期的反应。"

[[categories]]
id = "vague_problem_statement"
name = "问题表述笼统"
severity = "high"
weight = 0.8
description = "用“存在诸多问题”“面临挑战”“亟需优化”等宽泛说法代替明确、可测量的问题。"
rewrite_mode = "manual_or_llm"
signals = ["存在诸多问题", "面临诸多挑战", "亟需优化"]
regex_patterns = ["存在(?:诸多|一些|很多|较多)(?:问题|不足|挑战)", "面临(?:诸多|严峻|复杂)(?:挑战|问题|压力)", "亟需(?:优化|提升|完善|改进)", "有待(?:进一步)?(?:优化|提升|完善)"]
false_positive_notes = ["若该表述来自访谈原话、政策原文或文献直接引用，应保留原文并标注来源。", "若同段已经给出具体数据、企业场景或因果机制，可降低风险。", "绪论开头可先概括问题，但下一句应落到具体指标或案例。"]
rewrite_principles = ["明确问题对象、时间范围和可度量表现。", "避免只写“问题很多”，要写“什么指标恶化”。"]

[[categories.examples]]
before = "当前企业管理存在诸多问题，亟需优化。"
after = "XYZ公司2023年客户投诉率为8.6%，高于行业均值3.1个百分点，主要集中在售后响应。"

[[categories.examples]]
before = "绩效管理体系有待进一步完善。"
after = "该公司年度考核结果集中在A/B两档，2023年区分度不足，影响奖金分配公平性。"

[[categories]]
id = "unsupported_quantification"
name = "无来源量化断言"
severity = "high"
weight = 0.9
description = "文本给出百分比、排名、增长率等数字，但没有数据来源、调查说明或统计口径。"
rewrite_mode = "manual_or_llm"
signals = ["提升20%", "增长明显", "排名第一"]
regex_patterns = ["(?:提升|增长|下降|降低|减少)[^，。]{0,8}\\d+(?:\\.\\d+)?%", "(?:达到|超过|低于|高于)\\d+(?:\\.\\d+)?%", "排名第[一二三四五六七八九十1-9]", "占比(?:达到|为)?\\d+(?:\\.\\d+)?%"]
false_positive_notes = ["若该表述来自访谈原话、政策原文或文献直接引用，应保留原文并标注来源。", "若同段已经给出具体数据、企业场景或因果机制，可降低风险。", "若同句含“根据/来源/问卷/年报/访谈/N=”等来源提示，可降低风险。"]
rewrite_principles = ["补充数据来源、样本量、统计口径和时间。", "无法核实时改为定性描述并标注需补数据。"]
phrase_replacements = [
    "提升X% → (样本量N=, 时间窗=, 来源=)提升X%",
    "达到X的统计显著性 → 经(检验方法)检验,p < α",
    "排名第X → 据(榜单/口径, 时间)排名第X",
    "增长率X% → 较(基期)增长X%(基期绝对值)",
    "覆盖率达X% → 样本范围(对象, 时间)覆盖率达X%",
    "超过X% → 较(基期/对照)高出X个百分点",
]

[[categories.examples]]
before = "客户满意度提升20%。"
after = "根据2023年12月客户问卷（N=120），客户满意度从3.8分升至4.5分。"

[[categories.examples]]
before = "该公司市场份额排名第一。"
after = "根据行业协会2023年统计，该公司区域市场份额为18%，位列第一。"

[[categories]]
id = "overbroad_scope"
name = "选题范围过大"
severity = "medium"
weight = 0.65
description = "论文表述把一个企业案例扩展为行业、时代、国家层面的普遍结论，超出MBA论文应有边界。"
rewrite_mode = "manual_or_llm"
signals = ["对整个行业具有指导意义", "推动全国企业发展", "适用于所有企业"]
regex_patterns = ["对(?:整个|全)行业[^，。]*(?:指导|借鉴|推广)意义", "适用于(?:所有|各类|全国)[^，。]*(?:企业|组织)", "推动(?:全国|全社会|整个行业)[^，。]*(?:发展|变革|升级)", "为[^，。]*行业(?:提供|奠定)[^，。]*(?:范式|基础)"]
false_positive_notes = ["若该表述来自访谈原话、政策原文或文献直接引用，应保留原文并标注来源。", "若同段已经给出具体数据、企业场景或因果机制，可降低风险。", "论文结论可讨论可推广性，但必须说明适用边界和限制条件。"]
rewrite_principles = ["把外推结论改成“对同类型企业有参考价值”。", "写清适用条件，而不是泛化到所有企业。"]

[[categories.examples]]
before = "本研究成果适用于所有制造企业。"
after = "本研究对规模相近、研发人员占比较高的制造企业具有参考价值。"

[[categories.examples]]
before = "该方案将推动整个行业变革。"
after = "该方案可为同类区域制造企业的绩效考核优化提供案例参考。"

[[categories]]
id = "empty_research_gap"
name = "空泛研究空白"
severity = "medium"
weight = 0.7
description = "用“研究较少”“尚不完善”“有待深入”宣称研究空白，但不说明已有研究缺在哪里。"
rewrite_mode = "manual_or_llm"
signals = ["研究较少", "尚不完善", "有待深入"]
regex_patterns = ["相关研究(?:较少|不足|不多)", "现有研究[^，。]*(?:尚不完善|仍不充分)", "有待(?:进一步)?深入(?:研究|探讨)", "研究空白(?:明显|突出)"]
false_positive_notes = ["若该表述来自访谈原话、政策原文或文献直接引用，应保留原文并标注来源。", "若同段已经给出具体数据、企业场景或因果机制，可降低风险。", "文献综述结尾可以概括不足，但应列出具体主题、方法或样本限制。"]
rewrite_principles = ["指出具体空白：对象、方法、变量、场景或数据来源。", "补充代表性文献，避免空喊“研究少”。"]

[[categories.examples]]
before = "现有研究仍不充分，有待深入。"
after = "现有研究多关注大型国企绩效考核，较少讨论中小制造企业研发人员的季度考核。"

[[categories.examples]]
before = "该领域研究空白明显。"
after = "既有文献较少将客户感知价值与转换成本同时纳入客户忠诚度模型。"
