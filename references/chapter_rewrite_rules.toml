# Chapter-specific Rewrite Rules
#
# Reference data for `SKILL.md` — the 「MBA论文章节特定改写规则」section.
# 五章节 × 多个改写点。每个章节的每个改写点带：
# - id       : 稳定标识符
# - ai_traces: 常见 AI 痕迹（含警惕词 / 模板）
# - rewrite_requirements: 改写要求（描述）
# - examples : before/after 示例（可选）

version = "1.3.0"
language = "zh-CN"
domain = "MBA thesis humanization"

[meta]
purpose = "MBA 论文五章节的特定改写规则。"
context = "SKILL.md「MBA论文章节特定改写规则」一节的源数据。"
chapter_labels_zh = ["绪论", "理论基础", "现状与问题分析", "对策建议", "结论"]

# ---------------------------------------------------------------------------
# 第 1 章 绪论
# ---------------------------------------------------------------------------

[[chapter]]
id = "chapter_1_introduction"
title = "第1章 绪论"
order = 1

[[chapter.section]]
id = "research_background"

[[chapter.section.ai_traces]]
before = "随着市场竞争日益激烈，企业面临诸多挑战"

[[chapter.section.ai_traces]]
before = "在……背景下"
note = "滥用背景句式"

[[chapter.section.ai_traces]]
before = "当今时代"

[[chapter.section.rewrite_requirements]]
text = "直接点明研究企业、具体问题、研究必要性"

[[chapter.section.examples]]
before = "随着市场竞争日益激烈，企业面临诸多挑战"
after = "XYZ 公司作为广东省制造企业，2022-2023 年市场份额从 15% 下降至 10%，亟需优化营销策略"

[[chapter.section]]
id = "purpose_and_significance"

[[chapter.section.ai_traces]]
before = "具有重要理论意义和实践价值"
note = "vague_attribution / 空泛研究意义"

[[chapter.section.ai_traces]]
before = "丰富相关理论研究"

[[chapter.section.rewrite_requirements]]
text = "具体说明解决什么问题、带来什么价值"

[[chapter.section.examples]]
before = "本研究具有重要理论意义和实践价值"
after = "本研究旨在通过优化 XYZ 公司绩效考核体系，解决当前研发人员流失率高达 25% 的问题，预期可将流失率降至 15% 以内"

[[chapter.section]]
id = "literature_review"

[[chapter.section.ai_traces]]
before = "简单罗列 A 说、B 说、C 说"
note = "缺乏归纳分析；chain_author_listing 维度直接命中"

[[chapter.section.rewrite_requirements]]
text = "按主题/流派分类整理；指出已有研究不足和空白；明确本文研究的补充价值"
quantitative = [
  "参考文献不少于 50 篇",
  "外文 ≥ 1/3",
  "近 5 年 ≥ 1/3",
  "近 2 年文献应有涉及",
  "期刊论文 ≥ 60%",
  "专著 ≤ 20%",
  "避免大量引用学位论文",
]

[[chapter.section]]
id = "research_methods"

[[chapter.section.rewrite_requirements]]
text = "说明为什么选择该方法；阐述如何应用；说明数据来源和收集方式；确保研究方法与论文类型匹配"
note = "避免「简单列举方法名称」类的 AI 痕迹 (chain_method_name)"

# ---------------------------------------------------------------------------
# 第 2 章 理论基础
# ---------------------------------------------------------------------------

[[chapter]]
id = "chapter_2_theory"
title = "第2章 理论基础"
order = 2

[[chapter.section]]
id = "concept_definition"

[[chapter.section.ai_traces]]
before = "大段引用教科书式理论阐述"
note = "理论与研究脱节"

[[chapter.section.rewrite_requirements]]
text = "界定核心概念（2-3 个主要概念）"

[[chapter.section]]
id = "theoretical_framework"

[[chapter.section.ai_traces]]
before = "理论罗列：介绍 5-6 个理论"
note = "也是 chain_method_name 的模板痕迹"

[[chapter.section.rewrite_requirements]]
text = "选择 1-2 个核心理论作为分析框架；理论与研究问题紧密结合；为后续分析奠定理论基础，而非纯理论介绍"

# ---------------------------------------------------------------------------
# 第 3 章 现状与问题分析
# ---------------------------------------------------------------------------

[[chapter]]
id = "chapter_3_analysis"
title = "第3章 现状与问题分析"
order = 3

[[chapter.section]]
id = "company_overview"

[[chapter.section.rewrite_requirements]]
text = "提供企业基本信息（成立时间、主营业务、规模等）；与研究问题相关的背景信息；数据真实，必要时可做脱敏处理"

[[chapter.section]]
id = "current_status"

[[chapter.section.ai_traces]]
before = "公司发展良好"
note = "模糊表述"

[[chapter.section.ai_traces]]
before = "取得显著成效"

[[chapter.section.rewrite_requirements]]
text = "用数据说话，提供具体指标；包含时间序列数据，展示变化趋势；与行业平均水平或竞争对手对比"

[[chapter.section]]
id = "problem_identification"

[[chapter.section.ai_traces]]
before = "存在诸多问题"
note = "chain_vague_problem_statement 直接命中"

[[chapter.section.ai_traces]]
before = "管理水平有待提升"

[[chapter.section.rewrite_requirements]]
text = "问题明确、具体、可度量；通过调研数据（问卷、访谈）识别问题；每个问题应有具体表现和证据"

[[chapter.section]]
id = "root_cause_analysis"

[[chapter.section.ai_traces]]
before = "原因是多方面的"
note = "表面化分析；causal_leap"

[[chapter.section.rewrite_requirements]]
text = "运用理论框架深入分析；分析因果机制，而非简单罗列；区分根本原因和表面原因；有数据或案例支撑"

# ---------------------------------------------------------------------------
# 第 4 章 对策建议
# ---------------------------------------------------------------------------

[[chapter]]
id = "chapter_4_solutions"
title = "第4章 对策建议"
order = 4

[[chapter.section]]
id = "recommendations"

[[chapter.section.ai_traces]]
before = "加强管理"
note = "all_purpose_recommendation；万能型建议"

[[chapter.section.ai_traces]]
before = "完善制度"

[[chapter.section.rewrite_requirements]]
text = [
  "建议具体、可操作、可落地",
  "结合企业实际资源和能力约束",
  "明确实施阶段、步骤和优先级",
  "预期效果可量化",
  "与问题分析一一对应",
]
note = "与第3章的 problem_identification 一一对应；cross_section_problem_trace 维度会反过来检查"

# ---------------------------------------------------------------------------
# 第 5 章 结论
# ---------------------------------------------------------------------------

[[chapter]]
id = "chapter_5_conclusion"
title = "第5章 结论"
order = 5

[[chapter.section]]
id = "findings"

[[chapter.section.ai_traces]]
before = "简单重复摘要"
note = "chain_conclusion_echo 直接命中"

[[chapter.section.ai_traces]]
before = "综上所述"

[[chapter.section.rewrite_requirements]]
text = "分条列出主要研究发现（用「提出了」「建立了」等）"

[[chapter.section]]
id = "innovation"

[[chapter.section.ai_traces]]
before = "首次研究"
note = "创新点空泛"

[[chapter.section.ai_traces]]
before = "填补空白"

[[chapter.section.rewrite_requirements]]
text = "明确指出创新点（新见解、新方法、新应用）"

[[chapter.section]]
id = "limitations_outlook"

[[chapter.section.rewrite_requirements]]
text = "说明研究局限性；提出未来研究展望"

[[chapter.section]]
id = "length_constraint"

[chapter.section.length_constraint]
target_max_words = 2000
note = "结论 ≤ 2000 字；不与摘要雷同"
